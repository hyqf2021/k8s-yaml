apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "mysql.fullname" . }}
  labels:
    {{- include "mysql.labels" . | nindent 4 }}
spec:
  serviceName: {{ include "mysql.fullname" . }}
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "mysql.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "mysql.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      initContainers:
        - name: init-mysql-config
          image: "{{ .Values.busybox.repository }}:{{ .Values.busybox.tag }}"
          imagePullPolicy: {{ .Values.busybox.pullPolicy }}
          command:
            - sh
            - -c
            - |
              set -e
              ORDINAL=$(echo "$HOSTNAME" | grep -o '[0-9]*$')

              if [ "$ORDINAL" -eq 0 ]; then
                cat > /mnt/conf.d/mysql.cnf <<'EOF'
              [mysqld]
              server-id=1
              log-bin=mysql-bin
              binlog-format=ROW
              gtid-mode=ON
              enforce-gtid-consistency=ON
              log-slave-updates=ON
              default_authentication_plugin=mysql_native_password
              EOF
              else
                SERVER_ID=$((100 + ORDINAL))
                cat > /mnt/conf.d/mysql.cnf <<EOF
              [mysqld]
              server-id=${SERVER_ID}
              log-bin=mysql-bin
              binlog-format=ROW
              gtid-mode=ON
              enforce-gtid-consistency=ON
              log-slave-updates=ON
              default_authentication_plugin=mysql_native_password
              EOF
              fi
          volumeMounts:
            - name: dynamic-config
              mountPath: /mnt/conf.d
        - name: prepare-init-sql
          image: "{{ .Values.busybox.repository }}:{{ .Values.busybox.tag }}"
          imagePullPolicy: {{ .Values.busybox.pullPolicy }}
          command:
            - sh
            - -c
            - |
              set -e
              ORDINAL=$(echo "$HOSTNAME" | grep -o '[0-9]*$')
              if [ "$ORDINAL" -eq 0 ]; then
                sed "s/\${REPL_PASSWORD}/$MYSQL_REPLICATION_PASSWORD/g" \
                  /mnt/init-template/init-replication-user.sql \
                  > /docker-entrypoint-initdb.d/init-replication-user.sql
                echo "Master: init SQL prepared."
              else
                echo "Slave: skipping init SQL."
              fi
          env:
            - name: MYSQL_REPLICATION_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "mysql.secretName" . }}
                  key: {{ .Values.auth.replicationPasswordKey }}
          volumeMounts:
            - name: init-template
              mountPath: /mnt/init-template
            - name: init-scripts
              mountPath: /docker-entrypoint-initdb.d
      containers:
        - name: mysql
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "mysql.secretName" . }}
                  key: {{ .Values.auth.rootPasswordKey }}
          ports:
            - name: mysql
              containerPort: {{ .Values.service.port }}
          volumeMounts:
            - name: mysql-data
              mountPath: /var/lib/mysql
            - name: dynamic-config
              mountPath: /etc/mysql/conf.d
            - name: init-scripts
              mountPath: /docker-entrypoint-initdb.d
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          livenessProbe:
            tcpSocket:
              port: mysql
            initialDelaySeconds: {{ .Values.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.livenessProbe.periodSeconds }}
          readinessProbe:
            tcpSocket:
              port: mysql
            initialDelaySeconds: {{ .Values.readinessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.readinessProbe.periodSeconds }}
        - name: replication-sidecar
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - sh
            - -c
            - |
              set -e
              ORDINAL=$(echo "$HOSTNAME" | grep -o '[0-9]*$')

              if [ "$ORDINAL" -eq 0 ]; then
                echo "Waiting for local Master MySQL to start..."
                until mysql -h 127.0.0.1 -uroot -p"$MYSQL_ROOT_PASSWORD" -e "SELECT 1" 2>/dev/null; do
                  sleep 3
                done
                echo "Creating/Verifying replication user on Master..."
                mysql -h 127.0.0.1 -uroot -p"$MYSQL_ROOT_PASSWORD" -e "
              CREATE USER IF NOT EXISTS 'replica'@'%' IDENTIFIED WITH mysql_native_password BY '$MYSQL_REPLICATION_PASSWORD';
              ALTER USER 'replica'@'%' IDENTIFIED WITH mysql_native_password BY '$MYSQL_REPLICATION_PASSWORD';
              GRANT REPLICATION SLAVE ON *.* TO 'replica'@'%';
              FLUSH PRIVILEGES;"
                echo "Replication user verified on Master."
                sleep infinity
              fi

              MASTER_HOST="{{ include "mysql.fullname" . }}-0.{{ include "mysql.fullname" . }}.{{ .Release.Namespace }}.svc.cluster.local"

              echo "Waiting for local MySQL to start..."
              until mysql -h 127.0.0.1 -uroot -p"$MYSQL_ROOT_PASSWORD" -e "SELECT 1" 2>/dev/null; do
                sleep 3
              done

              SLAVE_STATUS=$(mysql -h 127.0.0.1 -uroot -p"$MYSQL_ROOT_PASSWORD" -e "SHOW SLAVE STATUS\G" 2>/dev/null)
              if [ -n "$SLAVE_STATUS" ]; then
                echo "Replication already configured."
              else
                echo "Waiting for Master at ${MASTER_HOST} port {{ .Values.service.port }}..."
                until mysql -h "$MASTER_HOST" -ureplica -p"$MYSQL_REPLICATION_PASSWORD" -e "SELECT 1" 2>/dev/null; do
                  sleep 3
                done

                echo "Configuring replication..."
                mysql -h 127.0.0.1 -uroot -p"$MYSQL_ROOT_PASSWORD" -e "
              CHANGE MASTER TO
                MASTER_HOST='$MASTER_HOST',
                MASTER_USER='replica',
                MASTER_PASSWORD='$MYSQL_REPLICATION_PASSWORD',
                MASTER_AUTO_POSITION=1;
              START SLAVE;"
                echo "Replication started."

                mysql -h 127.0.0.1 -uroot -p"$MYSQL_ROOT_PASSWORD" -e "SET GLOBAL super_read_only=ON;"
                echo "Slave set to super_read_only."
              fi

              sleep infinity
          env:
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "mysql.secretName" . }}
                  key: {{ .Values.auth.rootPasswordKey }}
            - name: MYSQL_REPLICATION_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "mysql.secretName" . }}
                  key: {{ .Values.auth.replicationPasswordKey }}
      volumes:
        {{- if not .Values.persistence.enabled }}
        - name: mysql-data
          emptyDir: {}
        {{- end }}
        - name: init-template
          configMap:
            name: {{ include "mysql.fullname" . }}-init-sql
        - name: init-scripts
          emptyDir: {}
        - name: dynamic-config
          emptyDir: {}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
  {{- if .Values.persistence.enabled }}
  volumeClaimTemplates:
    - apiVersion: v1
      kind: PersistentVolumeClaim
      metadata:
        name: mysql-data
      spec:
        accessModes:
          {{- toYaml .Values.persistence.accessModes | nindent 10 }}
        {{- if .Values.persistence.storageClassName }}
        storageClassName: {{ .Values.persistence.storageClassName | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.persistence.size }}
  {{- end }}
